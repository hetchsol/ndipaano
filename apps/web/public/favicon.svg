<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <style>
      .ecg-line {
        stroke-dasharray: 120;
        stroke-dashoffset: 120;
        animation: draw 4s ease-in-out infinite;
      }
      @keyframes draw {
        0% { stroke-dashoffset: 120; }
        50% { stroke-dashoffset: 0; }
        100% { stroke-dashoffset: -120; }
      }
      @keyframes blink {
        0%, 100% { opacity: 0.3; }
        50% { opacity: 1; }
      }
      .pin-dot {
        animation: blink 2s ease-in-out infinite;
      }
    </style>
  </defs>
  <!-- Heart shape -->
  <path d="M32 52 C32 52 6 34 6 18 C6 8 14 2 23 2 C28 2 32 6 32 6 C32 6 36 2 41 2 C50 2 58 8 58 18 C58 34 32 52 32 52Z"
        fill="#DC2626"
        stroke="#B91C1C"
        stroke-width="1.5"/>
  <!-- Animated ECG/heartbeat line -->
  <polyline class="ecg-line"
            points="10,24 18,24 21,24 24,16 27,32 30,12 33,28 36,20 39,24 42,24 46,24 54,24"
            fill="none"
            stroke="white"
            stroke-width="2.2"
            stroke-linecap="round"
            stroke-linejoin="round"/>
  <!-- Pin point at bottom (blinking) with mini map pin -->
  <circle class="pin-dot" cx="32" cy="48" r="3.5" fill="white"/>
  <g class="pin-dot">
    <path d="M32 51.5 C32 51.5 29 48.5 29 47 C29 45.3 30.3 44 32 44 C33.7 44 35 45.3 35 47 C35 48.5 32 51.5 32 51.5Z"
          fill="#DC2626"/>
    <circle cx="32" cy="46.8" r="1" fill="white"/>
  </g>
  <!-- Subtle highlight -->
  <path d="M18 10 C14 14 11 18 10 22"
        fill="none"
        stroke="rgba(255,255,255,0.3)"
        stroke-width="2.5"
        stroke-linecap="round"/>
  <!-- Shadow -->
  <ellipse cx="32" cy="56" rx="8" ry="2.5" fill="rgba(0,0,0,0.12)"/>
</svg>
